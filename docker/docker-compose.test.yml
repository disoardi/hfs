# Test cluster: HDFS NameNode + 2 DataNode + Hive Metastore
# Usage:
#   docker compose -f docker/docker-compose.test.yml up -d
#   docker compose -f docker/docker-compose.test.yml down -v
version: "3.8"

networks:
  hdfs-net:
    driver: bridge

volumes:
  namenode-data:
  datanode1-data:
  datanode2-data:

services:
  namenode:
    image: apache/hadoop:3.3.6
    hostname: namenode
    container_name: hfs-test-namenode
    networks:
      - hdfs-net
    ports:
      - "9870:9870"   # WebHDFS / NameNode UI
      - "8020:8020"   # RPC
    environment:
      HADOOP_HOME: /opt/hadoop
      CLUSTER_NAME: hfs-test
    volumes:
      - namenode-data:/tmp/hadoop-root/dfs/name
      - ./init/hadoop-config/:/opt/hadoop/etc/hadoop/custom/:ro
      - ./init/fixtures/:/fixtures/:ro
    command: >
      bash -c "
        cp /opt/hadoop/etc/hadoop/custom/*.xml /opt/hadoop/etc/hadoop/ 2>/dev/null || true
        hdfs namenode -format -force -nonInteractive &&
        hdfs namenode
      "
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9870/jmx?qry=Hadoop:service=NameNode,name=NameNodeStatus"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  datanode1:
    image: apache/hadoop:3.3.6
    hostname: datanode1
    container_name: hfs-test-datanode1
    networks:
      - hdfs-net
    environment:
      HADOOP_HOME: /opt/hadoop
    volumes:
      - datanode1-data:/tmp/hadoop-root/dfs/data
      - ./init/hadoop-config/:/opt/hadoop/etc/hadoop/custom/:ro
    command: >
      bash -c "
        cp /opt/hadoop/etc/hadoop/custom/*.xml /opt/hadoop/etc/hadoop/ 2>/dev/null || true
        hdfs datanode
      "
    depends_on:
      namenode:
        condition: service_healthy

  datanode2:
    image: apache/hadoop:3.3.6
    hostname: datanode2
    container_name: hfs-test-datanode2
    networks:
      - hdfs-net
    environment:
      HADOOP_HOME: /opt/hadoop
    volumes:
      - datanode2-data:/tmp/hadoop-root/dfs/data
      - ./init/hadoop-config/:/opt/hadoop/etc/hadoop/custom/:ro
    command: >
      bash -c "
        cp /opt/hadoop/etc/hadoop/custom/*.xml /opt/hadoop/etc/hadoop/ 2>/dev/null || true
        hdfs datanode
      "
    depends_on:
      namenode:
        condition: service_healthy

  # Hive Metastore (standalone mode, metastore DB in Derby)
  hive-metastore:
    image: apache/hive:3.1.3
    hostname: hive-metastore
    container_name: hfs-test-hms
    networks:
      - hdfs-net
    ports:
      - "9083:9083"   # Thrift
      - "8080:8080"   # HTTP API (HMS 3+)
    environment:
      SERVICE_NAME: metastore
      HADOOP_HOME: /opt/hadoop
      HIVE_HOME: /opt/hive
    volumes:
      - ./init/hadoop-config/:/opt/hadoop/etc/hadoop/custom/:ro
    command: >
      bash -c "
        cp /opt/hadoop/etc/hadoop/custom/*.xml /opt/hadoop/etc/hadoop/ 2>/dev/null || true
        /entrypoint.sh
      "
    depends_on:
      namenode:
        condition: service_healthy

  # Client container: used to load fixtures and for manual testing
  hdfs-client:
    image: apache/hadoop:3.3.6
    hostname: hdfs-client
    container_name: hfs-test-client
    networks:
      - hdfs-net
    volumes:
      - ./init/fixtures/:/fixtures/:ro
      - ./init/load-fixtures.sh:/load-fixtures.sh:ro
      - ./init/hadoop-config/:/opt/hadoop/etc/hadoop/custom/:ro   # required for hdfs dfs commands
    command: >
      bash -c "
        cp /opt/hadoop/etc/hadoop/custom/*.xml /opt/hadoop/etc/hadoop/ 2>/dev/null || true
        echo 'Client ready — run: docker exec hfs-test-client /load-fixtures.sh' &&
        sleep infinity
      "
    depends_on:
      namenode:
        condition: service_healthy
