name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace

  build-musl:
    name: Build static binary (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build musl binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Verify static binary
        run: |
          ldd target/x86_64-unknown-linux-musl/release/hfs || true
          ls -lh target/x86_64-unknown-linux-musl/release/hfs
          echo "Binary size OK" && [ $(stat -c%s target/x86_64-unknown-linux-musl/release/hfs) -lt 20971520 ]

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hfs-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/hfs

  integration-test:
    name: Integration tests (Docker HDFS)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Start HDFS test cluster
        run: |
          docker compose -f docker/docker-compose.test.yml up -d
          # Wait for NameNode to be healthy
          timeout 120 bash -c 'until docker compose -f docker/docker-compose.test.yml ps | grep namenode | grep healthy; do sleep 5; done'
          echo "NameNode is healthy"

      - name: Load test fixtures
        run: |
          docker exec hfs-test-client /load-fixtures.sh || true

      - name: Run integration tests
        env:
          HFS_NAMENODE: http://localhost:9870
        run: cargo test --workspace -- --include-ignored

      - name: Teardown
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v
